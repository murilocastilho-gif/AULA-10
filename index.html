<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Adoção de Cães</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1> Adoção Responsável</h1>

    <form id="form">

        <input type="text" id="nome" placeholder="Nome completo">
        <input type="text" id="email" placeholder="Email">
        <input type="text" id="telefone" placeholder="Telefone">
        <input type="text" id="cpf" placeholder="CPF">
        <input type="number" id="idade" placeholder="Idade">
        <input type="text" id="cidade" placeholder="Cidade">

        <select id="moradia">
            <option value="">Tipo de moradia</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>

        <select id="quintal">
            <option value="">Possui quintal?</option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>

        <select id="pet">
            <option value="">Já teve pet?</option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>

        <input type="number" id="horas" placeholder="Horas sozinho por dia">

        <textarea id="motivo" placeholder="Por que deseja adotar?"></textarea>

        <label class="check">
            <input type="checkbox" id="termo">
            Aceito o termo de responsabilidade
        </label>

        <button type="submit">Enviar</button>

    </form>

    <div id="resultado"></div>
</div>

<script src="script.js"></script>
</body>
</html>
